name: Build
on:
  push:
    branches: [ 'main' ]
    tags: [ '**' ]
  pull_request:
    paths-ignore:
      - docs/**
  workflow_dispatch:

jobs:
  check:
    needs: [ ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:

          - job_name: lint
            run_script: bun run lint

          - job_name: format
            run_script: bun run format:check

          - job_name: build
            run_script: |
              bun run pre-build
              bun run ts:build

          - job_name: api-exporter
            run_script: |
              bun add @microsoft/api-extractor ajv
              bun run pre-build
              bun run ts:build
              bun run ae:test

          - job_name: lint-imports
            run_script: bunx deptective

          - job_name: test
            run_script: |
                bun run test
                bun run test:legacy-decorators

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install deps
        run: |
          bun --version
          bun install --frozen-lockfile

      - name: Run ${{ matrix.job_name }}
        run: ${{ matrix.run_script }}


  snapshot:
    # Guards that engine-{tenant,system}-api/src/migrations/snapshot.ts is in sync
    # with the migrations: bootstraps two fresh DBs (full replay vs snapshot
    # fast-path) and diffs their schemas. Fails if snapshot.ts drifted —
    # regenerate with ./scripts/create-migrations-snapshot/run.sh <tenant|system>.
    needs: [ ]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install deps
        run: |
          bun --version
          bun install --frozen-lockfile
          sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Verify migrations snapshots
        run: ./scripts/create-migrations-snapshot/verify.sh
        env:
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres

  migration-order:
    # Guards that a PR does not introduce an engine migration whose filename
    # sorts BEFORE the newest migration already on the base branch — such a
    # migration would replay in a different relative order on a fresh DB than on
    # an already-migrated production DB. Pure-git, no database needed.
    needs: [ ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check migration ordering against base
        run: ./scripts/migrations/check-migration-order.sh "origin/${{ github.base_ref || github.event.repository.default_branch }}"

  test-db:
    needs: [ ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        postgres: [ 12, 13, 14, 15, 16 ]
    services:
      mailhog:
        image: mailhog/mailhog
        env:
          MH_CORS_ORIGIN: "*"
        ports:
          - 8025:8025
          - 1025:1025
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
            bun-version: 1.3.10
      - name: Install deps
        run: |
          bun --version
          bun install --frozen-lockfile
      - name: build
        run: bun run pre-build
      - name: "Build server"
        run: ./scripts/server-build/run.sh

      - name: Start server
        run: ./e2e/start-server.sh
        env:
          NODE_ENV: production
          DEFAULT_DB_HOST: 127.0.0.1
          DEFAULT_DB_PASSWORD: postgres
          DEFAULT_DB_USER: postgres
          DEFAULT_DB_PORT: 5432
          DEFAULT_DB_STATEMENT_TIMEOUT_MS: 3000
          DEFAULT_DB_QUERY_TIMEOUT_MS: 3000
          TENANT_DB_NAME: test_tenant
          CONTEMBER_PORT: 4000
          CONTEMBER_MONITORING_PORT: 4001
          CONTEMBER_ROOT_TOKEN: '0000000000000000000000000000000000000000'
          CONTEMBER_LOGIN_TOKEN: '1111111111111111111111111111111111111111'
          TENANT_MAILER_HOST: 'localhost'
          TENANT_MAILER_PORT: '1025'
          TENANT_MAILER_FROM: 'contember@localhost'
      - name: "Run E2E tests"
        run: bun run test:e2e --no-file-parallelism
        env:
          CONTEMBER_API_URL: "http://localhost:4000"
          CONTEMBER_ROOT_TOKEN: '0000000000000000000000000000000000000000'
          CONTEMBER_LOGIN_TOKEN: '1111111111111111111111111111111111111111'
          MAILHOG_URL: "http://localhost:8025"
