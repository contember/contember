name: Publish
on:
  push:
    tags:
      - '**'
permissions:
  id-token: write
  contents: read

jobs:
  publish-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # full clone so extract-version can read `git tag -l`; fetch-tags
          # collides with the tag-ref checkout on tag-triggered runs.
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install deps
        run: |
          bun --version
          bun install --frozen-lockfile

      - name: Extract version
        id: versions
        uses: ./.github/actions/extract-version
        with:
          version: ${{ github.ref }}

      - name: "Build app"
        run: bun run build

      - name: "Publish NPM"
        run: bash ./scripts/npm-publish/run.sh
        env:
          NPM_TAG: ${{ steps.versions.outputs.npmTag }}

  publish-docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [cli, engine]
    steps:
      - uses: actions/checkout@v5
        with:
          # full clone so extract-version can read `git tag -l`; fetch-tags
          # collides with the tag-ref checkout on tag-triggered runs.
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install deps
        run: |
          bun --version
          bun install --frozen-lockfile

      - name: Extract version
        id: versions
        uses: ./.github/actions/extract-version
        with:
          version: ${{ github.ref }}

      - name: "Publish Docker"
        run: bash ./scripts/docker/publish.sh ${{ matrix.image }}
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_TAGS: ${{ steps.versions.outputs.versions }}
